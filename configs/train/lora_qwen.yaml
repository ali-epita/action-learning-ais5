# Task 1 — LoRA adaptation of Qwen2.5-VL-3B.
# Defaults to the 50K subset to keep iteration cheap; bump to 200K for the final run.
seed: 42
model: qwen2.5-vl-3b

lora:
  r: 8
  alpha: 16
  dropout: 0.05
  bias: none
  backbone: qwen2.5-vl

training:
  output_dir: checkpoints/qwen2.5-vl-3b-lora-r8
  train_dataset: OS-Copilot/OS-Atlas-data
  train_subset_size: 50000
  num_train_epochs: 1.0
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 1.0e-4
  warmup_ratio: 0.03
  bf16: true
  fp16: false
  logging_steps: 25
  save_steps: 1000
